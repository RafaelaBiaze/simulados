version: '3.8'

services: 
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes: 
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - rede_proxy
  
  web1: 
    image: nginxdemos/hello
    networks:
      - rede_proxy
  
  web2:
    image: nginxdemos/hello
    networks:
      - rede_proxy

networks:
  rede_proxy:
    driver: bridge